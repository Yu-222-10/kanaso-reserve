<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  
  <title>今日の教室一覧</title>
  <link rel="stylesheet" href="stylesheet.css">
</head>
<body>

  <div class="room-wrapper">
    <div class="container room-container">
      
      <h2 id="today-date" style="margin-bottom: 20px; text-align: center;"></h2>
      
      <div class="time-section">
        <h1 class="section-title">昼休み</h1>
        <table class="room-table picked-table">
          <thead>
            <tr>
              <th>部屋名</th>
            </tr>
          </thead>
          <tbody id="lunch-list"></tbody>
        </table>
      </div>
      
      <div class="time-section" style="margin-top: 30px;">
        <h1 class="section-title">放課後</h1>
        <table class="room-table picked-table">
          <thead>
            <tr>
              <th>部屋名</th>
            </tr>
          </thead>
          <tbody id="afterschool-list"></tbody>
        </table>
      </div>

      <div class="btn-area" style="margin-top: 30px; text-align: center;">
        <a href="javascript:history.back()" class="back-btn">戻る</a>
      </div>

    </div>
  </div> 

  <div id="hidden-data-container" style="display: none;"></div>

  <script src="today.js"></script>
</body>
</html>
